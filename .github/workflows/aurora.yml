# ============================================================================
# Aurora CI — GitHub Actions
# ============================================================================
# 后端: JDK 25 + Maven (compile + test + package)
# 前端: Node.js 24 + npm (install + build)
# Docker: 可选构建推送 (需配置 DOCKER_USERNAME/PASSWORD secrets)
# ============================================================================

name: Aurora CI

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Backend: JDK 25 + Maven
  # ──────────────────────────────────────────────
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aurora-springboot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Compile
        run: mvn -B compile --file pom.xml -q

      - name: Run unit tests
        run: mvn -B test --file pom.xml

      - name: Package
        run: mvn -B package --file pom.xml -DskipTests -q

      # ── Docker build & push (optional) ──
      # Uncomment and set secrets.DOCKER_USERNAME/PASSWORD to enable:
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3
      #
      # - name: Login to DockerHub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     push: true
      #     context: aurora-springboot
      #     tags: ${{ secrets.DOCKER_USERNAME }}/aurora-springboot:latest
      #     file: aurora-springboot/Dockerfile

  # ──────────────────────────────────────────────
  # Frontend: Vue 3 (blog) + Vue 2 (admin)
  # ──────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            aurora-vue/aurora-blog/package-lock.json
            aurora-vue/aurora-admin/package-lock.json

      - name: Install & build aurora-blog (Vue 3)
        run: |
          cd aurora-vue/aurora-blog
          npm install
          npm run build

      - name: Install & build aurora-admin (Vue 2)
        run: |
          cd aurora-vue/aurora-admin
          npm install
          npm run build

      # ── Docker build & push (optional) ──
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3
      #
      # - name: Login to DockerHub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     push: true
      #     context: aurora-vue
      #     tags: ${{ secrets.DOCKER_USERNAME }}/aurora-vue:latest
      #     file: aurora-vue/Dockerfile