server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/aurora?serverTimezone=Asia/Shanghai&allowMultiQueries=true&useUnicode=true&characterEncoding=utf8&useSSL=false}
    username: ${MYSQL_USERNAME:aurora}
    password: ${MYSQL_PASSWORD:aurora123}
    hikari:
      minimum-idle: 10
      idle-timeout: 180000
      maximum-pool-size: 100
      auto-commit: true
      pool-name: MyHikariCP
      max-lifetime: 60000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  mvc:
    throw-exception-if-no-handler-found: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:aurora123}
      database: 0
      lettuce:
        pool:
          min-idle: 10
          max-idle: 100
          max-active: 100
          max-wait: 10000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aurora}
    password: ${RABBITMQ_PASSWORD:aurora123}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 3000

  elasticsearch:
    uris: ${ES_URIS:http://localhost:9201}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.163.com}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    protocol: smtp
    port: ${MAIL_PORT:465}
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            class: jakarta.net.ssl.SSLSocketFactory
            port: 465
          ssl:
            enable: true
          starttls:
            enable: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

upload:
  mode: ${UPLOAD_MODE:minio}
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    bucket: ${MINIO_BUCKET:aurora}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}

website:
  url: ${WEBSITE_URL:http://localhost:8080}

qq:
  app-id: ${QQ_APP_ID:}
  check-url: https://graph.qq.com/user/get_user_info

jwt:
  # WARNING: Dev-only weak secret. DO NOT use in production.
  # Use a 256-bit random key (e.g. openssl rand -base64 32) for production.
  secret: ${JWT_SECRET:aurora-dev-jwt-secret-key-change-in-production}

search:
  mode: ${SEARCH_MODE:mysql}

rabbitmq:
  address: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
