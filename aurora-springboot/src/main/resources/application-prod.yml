﻿server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 10
      idle-timeout: 180000
      maximum-pool-size: 100
      auto-commit: true
      pool-name: MyHikariCP
      max-lifetime: 60000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  mvc:
    throw-exception-if-no-handler-found: true

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          min-idle: 10
          max-idle: 100
          max-active: 100
          max-wait: 10000

  rabbitmq:
    host: ${RABBITMQ_HOST:}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 3000

  elasticsearch:
    uris: ${ES_URIS:}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.163.com}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    protocol: smtp
    port: ${MAIL_PORT:465}
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            class: jakarta.net.ssl.SSLSocketFactory
            port: 465
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:}

search:
  mode: ${SEARCH_MODE:elasticsearch}

# ---------------------------------------------------------------------------
# 文件上传配置
# mode: oss（阿里云OSS）/ minio（本地 MinIO）
# url: 对象存储访问域名，对应前端 VUE_APP_OSS_URL
#       部署前替换为你的云存储域名
# ---------------------------------------------------------------------------
upload:
  mode: ${UPLOAD_MODE:oss}
  # 对象存储访问基础 URL（供前端拼接图片地址），部署前必填
  url: ${OSS_URL:}
  oss:
    url: ${OSS_URL:}
    endpoint: ${OSS_ENDPOINT:}
    accessKeyId: ${OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
    bucketName: ${OSS_BUCKET_NAME:}
  minio:
    url: ${MINIO_URL:}
    endpoint: ${MINIO_ENDPOINT:}
    accesskey: ${MINIO_ACCESS_KEY:}
    secretKey: ${MINIO_SECRET_KEY:}
    bucketName: ${MINIO_BUCKET:}

# ---------------------------------------------------------------------------
# 网站部署地址
# 用于邮件模板链接、Knife4j API 文档地址、百度 SEO 推送
# 部署前替换为 https://www.yourdomain.com
# ---------------------------------------------------------------------------
website:
  url: ${WEBSITE_URL:}

# ---------------------------------------------------------------------------
# QQ 互联登录配置
# app-id: 在 QQ 互联（https://connect.qq.com）申请的应用 ID
# 需部署到公网域名并经 QQ 互联审核通过后才能使用
# ---------------------------------------------------------------------------
qq:
  app-id: ${QQ_APP_ID:}
  check-token-url: https://graph.qq.com/oauth2.0/me?access_token={access_token}
  user-info-url: https://graph.qq.com/user/get_user_info?openid={openid}&access_token={access_token}&oauth_consumer_key={oauth_consumer_key}
